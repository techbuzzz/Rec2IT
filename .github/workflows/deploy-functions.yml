name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/edge-functions/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest
    if: env.SUPABASE_ACCESS_TOKEN != ''
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy verify-run function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -d "supabase/edge-functions/verify-run" ]; then
            supabase functions deploy verify-run --project-ref $SUPABASE_PROJECT_REF
            echo "Deployed verify-run"
          else
            echo "::error::verify-run function directory not found"
            exit 1
          fi

      - name: Set function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -n "${{ secrets.ANTI_CHEAT_SECRET }}" ]; then
            supabase secrets set ANTI_CHEAT_SECRET=${{ secrets.ANTI_CHEAT_SECRET }} --project-ref $SUPABASE_PROJECT_REF
            echo "Set ANTI_CHEAT_SECRET"
          fi

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if ls supabase/migrations/*.sql 1> /dev/null 2>&1; then
            supabase db push --project-ref $SUPABASE_PROJECT_REF --include-all
            echo "Applied migrations"
          fi